  <desc id="desc">Modern technology themed placeholder for internal tech talk events.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf7ff" />
      <stop offset="100%" stop-color="#d7efff" />
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="24" />
  <rect x="120" y="90" width="560" height="300" rx="22" fill="#ffffff" opacity="0.95" />
